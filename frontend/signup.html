<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - ChainSankalp</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="auth-container">
    <h2>Create Account ✨</h2>
    <p>Your PRN will act as your Voter ID</p>

    <form id="signupForm">

        <!-- Name -->
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>
        </div>

        <!-- PRN -->
        <div class="input-group">
            <label>PRN Number</label>
            <input type="text" id="prn" placeholder="Enter 14-digit PRN" maxlength="14" required>
        </div>

        <!-- Phone -->
        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter 10-digit phone number" maxlength="10" required>
        </div>

        <!-- Email -->
        <div class="input-group">
            <label>Email ID</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <!-- Gender -->
        <div class="input-group">
            <label>Gender</label>
            <select required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <!-- Dept -->
        <div class="input-group">
            <label>department</label>
            <select required>
                <option value="">Select Department</option>
                <option value="CSE">Computer Science and Engineering</option>
                <option value="IT">Information Technology</option>
                <option value="ETCE">Electronics and telecommunication Engineering</option>
                <option value="ME">Mechanical Engineering</option>
                <option value="CE">Civil Engineering</option>
                <option value="AIML">AIML</option>
                <option value="AR">Automation and Robotics</option>
            </select>
        </div>

        <!-- Year -->
        <div class="input-group">
            <label>Year</label>
            <select required>
                <option value="">Select Year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>
        </div>

        <!-- Password -->
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create password" required>
        </div>

        <!-- Button -->
        <button class="auth-btn">Sign Up</button>
    </form>

    <div class="switch-link">
        Already have an account? <a href="signin.html">Sign In</a>
    </div>

    <div class="bharat-tag">
        🇮🇳 Built with ❤️ in Bharat
    </div>
</div>

<script src="js/auth.js"></script>

</body>
</html>

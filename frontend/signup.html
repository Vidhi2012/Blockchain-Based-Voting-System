<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - ChainSankalp</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="auth-container">
    <h2>Create Account</h2>

    <form id="signupForm">

        <!-- ALL YOUR EXISTING FIELDS (UNCHANGED) -->

        <!-- Name -->
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>

        <!-- PRN -->
        <div class="input-group">
            <label>PRN Number</label>
            <input type="text" id="prn" maxlength="14" required>
        </div>

        <!-- Phone -->
        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" maxlength="10" required>
        </div>

        <!-- Email -->
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <!-- Gender -->
        <div class="input-group">
            <label>Gender</label>
            <select id="gender" required>
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <!-- Department -->
        <div class="input-group">
            <label>Department</label>
            <select id="department" required>
                <option value="">Select</option>
                <option value="CSE">CSE</option>
                <option value="IT">IT</option>
                <option value="ETCE">ETCE</option>
                <option value="ME">ME</option>
                <option value="CE">CE</option>
                <option value="AIML">AIML</option>
                <option value="AR">AR</option>
            </select>
        </div>

        <!-- Year -->
        <div class="input-group">
            <label>Year</label>
            <select id="year" required>
                <option value="">Select</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
        </div>

        <!-- Role -->
        <div class="input-group">
            <label>Role</label>
            <select id="role" required>
                <option value="">Select Role</option>
                <option value="LR">LR</option>
                <option value="CS">CS</option>
                <option value="GS">GS</option>
            </select>
        </div>

        <!-- Manifesto -->
        <div class="input-group">
            <label>Manifesto</label>
            <textarea id="manifesto"></textarea>
        </div>

        <!-- Achievements -->
        <div class="input-group">
            <label>Achievements</label>
            <textarea id="achievements"></textarea>
        </div>

        <!-- Profile Photo -->
        <div class="input-group">
            <label>Profile Photo</label>
            <input type="file" id="profilePic" accept="image/*">
        </div>

        <!-- Password -->
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="auth-btn">Sign Up</button>
    </form>

    <!-- Signin Link -->
    <div class="switch-link">
        Already have an account? <a href="signin.html">Sign In</a>
    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
